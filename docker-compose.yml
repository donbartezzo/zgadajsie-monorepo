version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: local-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: zgadaj_user
      POSTGRES_PASSWORD: furGit320abc
      POSTGRES_DB: zgadaj_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'zgadaj_user']
      interval: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: local-pgadmin
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: donbartezzo@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

volumes:
  pgdata:
