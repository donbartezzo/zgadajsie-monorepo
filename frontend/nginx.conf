server {
    listen 80;
    # Docker embedded DNS - wymagane, by proxy_pass z zmienną działało w runtime
    resolver 127.0.0.11 valid=10s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;

    # HTTP API - proxy do backendu przez wewnętrzną sieć Docker
    location /api {
        set $backend "${BACKEND_PROXY_URL}";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (socket.io) - proxy do backendu przez wewnętrzną sieć Docker
    location /socket.io {
        set $backend "${BACKEND_PROXY_URL}";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # Cover images - filenames to UUID nadawane przez backend; replace tworzy nowy UUID,
    # więc plik pod danym URL nigdy nie zmienia treści. Można cache'ować immutable na rok.
    location ^~ /assets/covers/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Runtime config (per-kontener) - nigdy nie cache'ować, by zmiana MEDIA_URL/redeploy
    # zawsze dawała aktualną wartość.
    location = /runtime-config.js {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Angular SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
