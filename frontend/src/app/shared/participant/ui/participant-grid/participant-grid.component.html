@if (isPreEnrollment()) {
  <div class="flex flex-col items-center justify-center rounded-xl border border-info-200 bg-info-50 p-6 text-center">
    <app-icon name="users" size="lg" class="mb-3 text-info-400"></app-icon>
    <h3 class="text-sm font-semibold text-info-700">Trwają wstępne zapisy</h3>
    <p class="mt-1 text-xs text-neutral-500">Lista uczestników zostanie ujawniona po zakończeniu losowania.</p>
    @if (totalCount() > 0) {
      <p class="mt-2 text-xs font-medium text-info-600">Zgłoszonych: {{ totalCount() }}</p>
    }
  </div>
} @else {
  <div class="space-y-4">
    @for (section of sections(); track section.type) {
      <app-participant-grid-section
        [config]="section.config"
        [groups]="section.groups"
        [currentUserId]="currentUserId()"
        [count]="section.count"
        (itemClicked)="onSlotItemClick($event)"
      ></app-participant-grid-section>
    }
  </div>
}
