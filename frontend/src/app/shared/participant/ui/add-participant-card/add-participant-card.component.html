<button type="button" [class]="buttonClass()" (click)="clicked.emit()">

    <div
      class="w-14 h-14 flex items-center justify-center rounded-xl bg-primary-100 border-2 border-dashed border-primary-300"
    >
      <app-icon name="user-plus" size="lg" [class]="iconClass()" />
    </div>
  </div>

  <span [class]="'text-[11px] text-center leading-tight mt-1 w-full line-clamp-2 min-h-[2.5em] ' + nameClass()">
    Dodaj
  </span>
</button>
