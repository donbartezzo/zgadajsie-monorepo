@if (showBanner()) {
  <div class="w-full">
    <div class="w-full rounded-2xl border border-neutral-200 bg-white p-1 shadow-lg">
      <div class="flex items-center">
        <p class="flex-1 text-sm leading-relaxed text-neutral-700 text-center">
          Używamy cookies analitycznych, aby poprawiać działanie serwisu. Szczegóły w naszej
          <a routerLink="/privacy" class="font-medium text-primary-500 underline underline-offset-2"
            >polityce prywatności</a
          >.
        </p>
      </div>
      <div class="mt-3 flex justify-center gap-2">
        <app-button appearance="outline" color="neutral" size="xs" type="button" (clicked)="reject()">
          Odrzuć
        </app-button>
        <app-button appearance="solid" color="primary" size="xs" type="button" (clicked)="accept()">
          Akceptuj
        </app-button>
      </div>
    </div>
  </div>
}
