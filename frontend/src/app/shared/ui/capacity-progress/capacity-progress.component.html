@let _barText = barText();
@let _freeText = freeText();
@let _ariaText = ariaValueText();

<div
  class="{{ rootClass }}"
  role="progressbar"
  aria-valuemin="0"
  [attr.aria-valuemax]="max()"
  [attr.aria-valuenow]="occupiedCount()"
  [attr.aria-valuetext]="_ariaText"
>
  <div class="{{ trackClass }} relative">
    @if (occupiedPercent() > 0) {
      <!-- Wypełniony pasek - tekst zawsze na środku -->
      <div class="{{ barClass() }}" [style.width.%]="occupiedPercent()" [style]="barStyle()"></div>
    }

    <div class="absolute inset-0 flex items-center justify-center">
      <span class="text-[10px] font-semibold leading-none text-neutral-600">{{ _barText }}</span>
    </div>
  </div>
  @if (_freeText) {
    <p class="{{ subtitleClass }}">{{ _freeText }}</p>
  }
</div>
