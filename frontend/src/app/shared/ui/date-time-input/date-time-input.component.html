<div class="relative">
  <button
    type="button"
    class="flex w-full items-center justify-between gap-3 rounded-xl border border-neutral-300 bg-white px-3 py-2 text-left text-sm text-neutral-900 focus:outline-hidden focus:ring-2 focus:ring-primary-500 disabled:cursor-not-allowed disabled:bg-neutral-100"
    [disabled]="disabled()"
    (click)="toggle()"
  >
    <span [class.text-neutral-400]="!displayValue()">
      {{ displayValue() || 'Wybierz datę i godzinę' }}
    </span>
    <span class="flex items-center gap-2">
      <app-icon name="calendar" size="sm" color="primary"></app-icon>
    </span>
  </button>

  @if (isOpen()) {
    <div class="absolute z-20 mt-2 w-full rounded-2xl border border-neutral-200 bg-white p-4 shadow-xl">
      <div class="space-y-4">
        <div>
          <div class="mb-1 block text-xs font-medium text-neutral-600">Data</div>
          <input
            type="date"
            aria-label="Data wydarzenia"
            class="w-full rounded-xl border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900 focus:outline-hidden focus:ring-2 focus:ring-primary-500"
            [value]="dateValue()"
            (input)="onDateChange($any($event.target).value)"
          />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <div class="mb-1 block text-xs font-medium text-neutral-600">Godzina</div>
            <select
              aria-label="Godzina wydarzenia"
              class="w-full rounded-xl border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900 focus:outline-hidden focus:ring-2 focus:ring-primary-500"
              [value]="hourValue()"
              (change)="onHourChange($any($event.target).value)"
            >
              @for (hour of hours; track hour) {
                <option [value]="hour" [selected]="hour === hourValue()">{{ hour }}</option>
              }
            </select>
          </div>

          <div>
            <div class="mb-1 block text-xs font-medium text-neutral-600">Minuta</div>
            <select
              aria-label="Minuta wydarzenia"
              class="w-full rounded-xl border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900 focus:outline-hidden focus:ring-2 focus:ring-primary-500"
              [value]="minuteValue()"
              (change)="onMinuteChange($any($event.target).value)"
            >
              @for (minute of minutes; track minute) {
                <option [value]="minute" [selected]="minute === minuteValue()">{{ minute }}</option>
              }
            </select>
          </div>
        </div>

        <div class="flex justify-end gap-2">
          @if (displayValue()) {
            <button
              type="button"
              class="rounded-xl border border-neutral-300 bg-white px-4 py-2 text-sm font-medium text-neutral-700"
              (click)="clear()"
            >
              Wyczyść
            </button>
          }
          <button
            type="button"
            class="rounded-xl bg-primary-500 px-4 py-2 text-sm font-medium text-white"
            (click)="close()"
          >
            Gotowe
          </button>
        </div>
      </div>
    </div>
  }
</div>
