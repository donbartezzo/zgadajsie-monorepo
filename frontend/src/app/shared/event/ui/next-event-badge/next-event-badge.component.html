@let _viewModel = viewModel();

@if (_viewModel) {
  <div class="opacity-90">
    <app-button
      appearance="outline"
      color="neutral"
      size="xs"
      alignment="start"
      iconRight="chevron-right"
      (click)="onBadgeClick()"
    >
      <app-event-info-item color="primary" size="sm" label="Najbliższe wydarzenie" [value]="_viewModel.timeLabel" />
    </app-button>
  </div>
}
