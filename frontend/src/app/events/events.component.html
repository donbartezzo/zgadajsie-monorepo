<div class="card card-style">
  <div class="content">
    <h2 class="font-20 font-700 mb-3">Nadchodzące wydarzenia</h2>

    @for (event of events; track event.id) {
      <div class="card card-style mb-3">
        <div class="content">
          <h3 class="font-16 font-600 mb-1">{{ event.title }}</h3>
          <p class="opacity-80 mb-2">
            {{ event.date }} · {{ event.location }}
          </p>
          <a href="#" class="btn btn-xs bg-highlight">
            Szczegóły
          </a>
        </div>
      </div>
    }
  </div>
</div>
