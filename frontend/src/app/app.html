<div class="min-h-screen relative overflow-hidden bg-[#eaeaef] dark:bg-slate-900">
  <!-- Rotated tiled background (hidden on mobile, shown on desktop via styles.scss) -->
  <div class="app-bg-pattern" aria-hidden="true"></div>

  <!-- Main app container (styled on desktop via styles.scss) -->
  <div class="app-container dark:bg-slate-900 dark:border-slate-700 p-3">
    <app-snackbar></app-snackbar>

    <main class="flex-1">
      <router-outlet></router-outlet>

      @if (!isHome()) {
      <app-footer></app-footer>
      }
    </main>
  </div>

  <!-- Bottom nav: fixed outside container so overflow:hidden doesn't affect it -->
  <app-bottom-nav></app-bottom-nav>
</div>
