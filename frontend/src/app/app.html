@if (maintenance) {
  <div class="app min-h-screen flex items-center justify-center px-4 py-10">
    <div class="max-w-md w-full rounded-3xl border border-warning-200 bg-white p-6 text-center shadow-xs">
      <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-warning-50 text-warning-600">
        <app-icon name="alert-triangle" size="lg" color="warning"></app-icon>
      </div>
      <h1 class="text-2xl font-bold text-neutral-900">Trwają prace techniczne</h1>
      <p class="mt-3 text-sm leading-6 text-neutral-600">Serwis jest chwilowo niedostępny. To nie potrwa długo.</p>
      <div class="mt-6 rounded-2xl bg-neutral-50 px-4 py-3 text-sm text-neutral-700">
        W razie pilnych spraw prosimy o kontakt pod adresem: <strong>{{ contactEmail }}</strong>
      </div>
    </div>
  </div>
} @else {
  <div class="app" [class.app--two-column]="layoutConfig.desktopLayout() === 'two-column'">
    <!-- Rotated tiled background — widoczny w marginesach boxa (desktop), ukryty na mobile -->
    <div class="app-bg-pattern" aria-hidden="true"></div>

    <!-- Desktop top navigation (od `lg`; bottom-nav ukryty na `lg`) -->
    <app-top-nav></app-top-nav>

    <!-- Main app container (płaski full-bleed shell; treść capped w page-layout) -->
    <div class="app-container">
      <app-snackbar></app-snackbar>

      <app-page-layout>
        <router-outlet></router-outlet>
      </app-page-layout>

      <!-- Cookie consent banner: fixed above bottom nav -->
      <app-cookie-consent-banner />

      <app-bottom-overlays />
    </div>

    <!-- Explainer: outside container so it appears above modals (z-index 90 > modal z-index 70) -->
    <app-explainer />

    <!-- Modal host: fixed outside container so z-index works correctly -->
    <app-modal-host />

    <!-- Confirm modal: outside container to be in same stacking context as modal-host (z-index 100 > 70) -->
    <app-confirm-modal />

    <!-- Bottom nav: fixed outside container so overflow:hidden doesn't affect it -->
    <app-bottom-nav></app-bottom-nav>
  </div>
}
