<div class="p-4">
  <h1 class="text-xl font-bold text-neutral-900 mb-4">Utwórz serię z wydarzenia</h1>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <div class="h-8 w-8 animate-spin rounded-full border-4 border-primary-300 border-t-primary-600"></div>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <app-card>
        <div class="p-4 space-y-4">
          <div>
            <label for="series-name" class="block text-sm font-medium text-neutral-700 mb-1">Nazwa serii</label>
            <input
              id="series-name"
              formControlName="name"
              placeholder="np. Trening środowy"
              class="w-full rounded-xl border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900"
            />
          </div>
        </div>
      </app-card>

      <app-card>
        <div class="p-4 space-y-4">
          <h3 class="text-sm font-semibold text-neutral-900">Powtarzanie</h3>
          <app-recurrence-picker [formGroup]="form" timezone="Europe/Warsaw" />
        </div>
      </app-card>

      <app-card>
        <div class="p-4 space-y-4">
          <h3 class="text-sm font-semibold text-neutral-900">Auto-uczestnicy (opcjonalnie)</h3>

          <label class="flex cursor-pointer items-center gap-3">
            <input
              type="checkbox"
              [checked]="fakeUsersEnabled()"
              (change)="fakeUsersEnabled.set($any($event.target).checked)"
              class="h-4 w-4 shrink-0 cursor-pointer rounded accent-highlight"
            />
            <span class="text-sm text-neutral-700">Włącz automatycznych uczestników</span>
          </label>

          @if (fakeUsersEnabled()) {
            <div class="grid grid-cols-3 gap-3" [formGroup]="fakeUsersForm">
              <div>
                <label for="fu-target" class="block text-xs font-medium text-neutral-600 mb-1">Target (%)</label>
                <input
                  id="fu-target"
                  type="number"
                  formControlName="targetOccupancy"
                  min="0"
                  max="100"
                  class="w-full rounded-xl border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900"
                />
              </div>
              <div>
                <label for="fu-cleanup" class="block text-xs font-medium text-neutral-600 mb-1">Cleanup (h)</label>
                <input
                  id="fu-cleanup"
                  type="number"
                  formControlName="cleanupHours"
                  min="0"
                  class="w-full rounded-xl border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900"
                />
              </div>
              <div>
                <label for="fu-buffer" class="block text-xs font-medium text-neutral-600 mb-1">Min. wolne</label>
                <input
                  id="fu-buffer"
                  type="number"
                  formControlName="minFreeSlotsBuffer"
                  min="0"
                  class="w-full rounded-xl border border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-900"
                />
              </div>
            </div>
          }
        </div>
      </app-card>

      <app-button
        type="submit"
        appearance="soft"
        color="primary"
        [fullWidth]="true"
        [loading]="submitting()"
        [disabled]="!canSubmit()"
      >
        Utwórz serię
      </app-button>
    </form>
  }
</div>
