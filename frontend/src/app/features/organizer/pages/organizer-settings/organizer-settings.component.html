<app-account-content>
  <div class="space-y-4">
    <!-- Wiadomość powitalna -->
    <app-card>
      <div class="space-y-3">
        <div class="flex items-start gap-3">
          <app-icon name="message-circle" size="sm" color="primary" class="mt-0.5 shrink-0"></app-icon>
          <p class="text-xs text-neutral-500">
            Automatyczna wiadomość wysyłana do każdego nowego uczestnika po zgłoszeniu na Twoje wydarzenie. Jeśli nie
            ustawisz własnego tekstu, zostanie użyty domyślny.
          </p>
        </div>

        <label class="flex cursor-pointer items-center gap-3">
          <input
            type="checkbox"
            [(ngModel)]="editWelcomeMessageEnabled"
            class="h-4 w-4 shrink-0 cursor-pointer rounded accent-highlight"
          />
          <span class="text-sm font-medium text-neutral-700"> Włącz auto-wiadomość powitalną </span>
        </label>

        @if (editWelcomeMessageEnabled) {
          <div>
            <label for="welcome-message" class="block text-xs font-medium text-neutral-600 mb-1">
              Treść wiadomości (opcjonalna)
            </label>
            <textarea
              id="welcome-message"
              [(ngModel)]="editWelcomeMessage"
              rows="4"
              maxlength="500"
              enterkeyhint="done"
              [placeholder]="defaultWelcomeMessage"
              class="w-full rounded-xl border border-neutral-300 bg-white px-4 py-2.5 text-sm text-neutral-900 placeholder:text-neutral-400 focus:outline-hidden focus:ring-2 focus:ring-primary-500 resize-none"
            ></textarea>
            <p class="mt-1 text-xs text-neutral-400">Zostaw puste aby użyć domyślnego tekstu. Maks. 500 znaków.</p>
          </div>
        }

        <div class="flex justify-end">
          <app-button appearance="soft" color="primary" [loading]="savingWelcome()" (clicked)="saveWelcomeMessage()">
            <app-icon name="check" size="sm"></app-icon> Zapisz
          </app-button>
        </div>
      </div>
    </app-card>
  </div>
</app-account-content>
