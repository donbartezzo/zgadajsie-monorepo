<div class="rounded-2xl border border-neutral-100 bg-white p-3 shadow-xs">
  @if (eventArea.canJoin()) {
    <div class="mb-3">
      <app-join-event-button />
    </div>
  }

  <nav class="flex flex-col gap-1">
    @for (tab of tabs; track tab.key) {
      @let active = activeKey() === tab.key;
      <button type="button" [class]="active ? activeItemClass : itemClass" (click)="select(tab.key)">
        <app-icon [name]="tab.icon" size="sm" />
        <span class="flex-1 text-left">{{ tab.label }}</span>
      </button>
    }
  </nav>

  @if (canManage()) {
    <div class="mt-3 border-t border-neutral-100 pt-3">
      <app-button appearance="outline" color="primary" size="sm" [fullWidth]="true" (clicked)="openManage()">
        <app-icon name="settings" size="sm" />
        Zarządzaj
      </app-button>
    </div>
  }
</div>
