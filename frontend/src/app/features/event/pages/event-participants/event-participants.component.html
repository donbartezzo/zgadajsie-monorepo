@let _event = event();
@let _loading = loading();
@let _isLoggedIn = auth.isLoggedIn();
@let _notificationBars = notificationBars();

<app-event-hero-slots [event]="_event" />

@if (_loading) {
  <app-loading-spinner></app-loading-spinner>
} @else {
  <div class="px-4 py-4 mb-20">
    <!-- Current user status banner -->
    @if (_isLoggedIn && _notificationBars.length > 0) {
      <div class="mb-4">
        <app-event-sticky-notification-bar
          [bars]="_notificationBars"
          (barAction)="eventArea.handleNotificationBarAction($event)"
        />
      </div>
    }

    @if (_event) {
      <app-participant-slots-grid
        [event]="_event"
        [participants]="participants()"
        [slots]="slots()"
        (refreshNeeded)="onRefreshNeeded()"
      />
    }
  </div>
}
