<section class="py-6 p-3">
  <header class="mb-4">
    <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100">Wydarzenia</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400">Znajdź coś dla siebie</p>
  </header>

  @if (isLoading() && events().length === 0) {
    <app-loading-spinner></app-loading-spinner>
  } @else if (error()) {
    <app-empty-state icon="x" [title]="'Błąd'" [message]="error()!"></app-empty-state>
  } @else if (events().length === 0) {
    <app-empty-state icon="calendar" title="Brak wydarzeń" message="Nie znaleziono żadnych nadchodzących wydarzeń."></app-empty-state>
  } @else {
    <div class="grid gap-4">
      @for (event of events(); track event.id) {
        <app-event-card [event]="event" (selected)="onEventSelected($event)"></app-event-card>
      }
    </div>
  }
</section>
