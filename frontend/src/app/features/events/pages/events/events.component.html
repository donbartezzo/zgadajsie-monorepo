<!-- Layout slots (auto-registered via directives) -->

<ng-template appLayoutSlot="overlay">
  <h1 class="text-lg font-extrabold text-white leading-tight">Wydarzenia</h1>
  <p class="text-xs text-white/80 mt-0.5">Znajdź coś dla siebie</p>
</ng-template>

<!-- Content -->
<section class="py-6 p-3">
  @if (isLoading() && events().length === 0) {
  <app-loading-spinner></app-loading-spinner>
  } @else if (error()) {
  <app-empty-state icon="x" [title]="'Błąd'" [message]="error()!"></app-empty-state>
  } @else if (events().length === 0) {
  <app-empty-state
    icon="calendar"
    title="Brak wydarzeń"
    message="Nie znaleziono żadnych nadchodzących wydarzeń."
  ></app-empty-state>
  } @else {
  <div class="grid gap-4">
    @for (event of events(); track event.id) {
    <app-event-card [event]="event" (selected)="onEventSelected($event)"></app-event-card>
    }
  </div>
  }
</section>
