<header class="fixed inset-x-0 top-0 z-50 max-w-app mx-auto bg-white/95 backdrop-blur-md dark:bg-slate-900/95">
  <div class="relative mx-auto flex h-12 max-w-md items-center justify-between px-4">
    <!-- Left: back arrow (hidden on home) -->
    @if (!isHome()) {
      <button
        type="button"
        class="inline-flex h-9 w-9 items-center justify-center rounded-full text-gray-700 transition-colors hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-slate-800"
        (click)="goBack()"
        aria-label="Wróć"
      >
        <app-icon name="arrow-left" size="sm" variant="default"></app-icon>
      </button>
    } @else {
      <span class="w-9"></span>
    }

    <!-- Center: page title -->
    <span class="absolute inset-x-0 text-center text-sm font-semibold text-gray-900 pointer-events-none dark:text-gray-100">
      {{ pageTitle() }}
    </span>

    <!-- Right: theme toggle -->
    <button
      type="button"
      class="inline-flex h-9 w-9 items-center justify-center rounded-full text-gray-700 transition-colors hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-slate-800"
      (click)="toggleTheme($event)"
      aria-label="Przełącz motyw jasny/ciemny"
    >
      <app-icon [name]="theme.isDark() ? 'moon' : 'sun'" size="sm" variant="default"></app-icon>
    </button>
  </div>
</header>
