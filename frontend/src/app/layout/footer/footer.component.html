<footer
  class="fixed inset-x-0 bottom-0 z-50 border-t border-slate-200 bg-white/95 px-2 py-1.5 shadow-[0_-4px_12px_rgba(15,23,42,0.12)] backdrop-blur-md dark:border-slate-700 dark:bg-slate-900/95"
  aria-label="Główna nawigacja dolna"
>
  <nav class="mx-auto flex max-w-md items-stretch justify-between gap-1 text-xs font-medium text-slate-500 dark:text-slate-300">
    <a
      routerLink="/"
      routerLinkActive="text-highlight dark:text-highlight-light"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex flex-1 flex-col items-center justify-center rounded-xl px-2 py-1.5 transition-colors hover:text-highlight dark:hover:text-highlight-light"
    >
      <app-icon name="home" size="md" variant="default" class="mb-0.5"></app-icon>
      <span>Start</span>
    </a>

    <a
      routerLink="/events"
      routerLinkActive="text-highlight dark:text-highlight-light"
      class="flex flex-1 flex-col items-center justify-center rounded-xl px-2 py-1.5 transition-colors hover:text-highlight dark:hover:text-highlight-light"
    >
      <app-icon name="calendar" size="md" variant="default" class="mb-0.5"></app-icon>
      <span>Wydarzenia</span>
    </a>

    @if (auth.isLoggedIn()) {
      <a
        routerLink="/events/new"
        routerLinkActive="text-highlight dark:text-highlight-light"
        class="flex flex-1 flex-col items-center justify-center rounded-xl px-2 py-1.5 transition-colors hover:text-highlight dark:hover:text-highlight-light"
      >
        <app-icon name="plus" size="md" variant="primary" class="mb-0.5"></app-icon>
        <span>Dodaj</span>
      </a>
    }

    <a
      routerLink="/profile"
      routerLinkActive="text-highlight dark:text-highlight-light"
      class="flex flex-1 flex-col items-center justify-center rounded-xl px-2 py-1.5 transition-colors hover:text-highlight dark:hover:text-highlight-light"
    >
      <app-icon name="user" size="md" variant="default" class="mb-0.5"></app-icon>
      <span>Profil</span>
    </a>
  </nav>
</footer>
