version: '3.9'

services:
  db-test:
    image: postgres:16
    container_name: zgadajsie-test-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: zgadajsie_test
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'test']
      interval: 5s
      retries: 5

volumes:
  pgdata_test:
